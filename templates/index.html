<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DailyDrop – Word of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0E1E3D;
      --navy-mid:   #16305E;
      --navy-light: #1E4080;
      --blue-soft:  #EEF2FA;
      --blue-line:  #C8D5EE;
      --white:      #FFFFFF;
      --off-white:  #F8F9FC;
      --ink:        #111827;
      --ink-soft:   #4B5563;
      --muted:      #9CA3AF;
      --accent:     #2563EB;
      --accent-glow:#DBEAFE;
      --red-soft:   #FEE2E2;
      --red:        #DC2626;
      --success:    #059669;
      --radius:     10px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--off-white);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--navy);
      backdrop-filter: blur(10px);
    }
    .nav-inner {
      max-width: 900px;
      margin: auto;
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--white);
      letter-spacing: 0.5px;
    }
    .logo em {
      font-style: italic;
      color: #7EB3FF;
    }
    .nav-date {
      font-size: 12px;
      color: #7EB3FF;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* ── HERO STRIP ── */
    .hero-strip {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
      padding: 64px 28px 72px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-strip::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7EB3FF;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .hero-word {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(52px, 9vw, 88px);
      color: var(--white);
      line-height: 1.0;
      margin-bottom: 10px;
      animation: wordIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes wordIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-phonetic {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 20px;
      color: #94B8F7;
      margin-bottom: 16px;
      min-height: 28px;
    }
    .hero-pos {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #CBD5E1;
      border-radius: 100px;
      padding: 4px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .audio-btn {
      display: none;
      align-items: center;
      gap: 6px;
      margin: 16px auto 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .audio-btn:hover { background: rgba(255,255,255,0.18); }
    .audio-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── MAIN CONTENT ── */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── WORD DETAIL CARD ── */
    .detail-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--blue-line);
      margin-top: -28px;
      padding: 40px 44px;
      box-shadow: 0 4px 24px rgba(14,30,61,0.08);
      animation: slideUp 0.5s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .meaning-text {
      font-size: 17px;
      color: var(--ink);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .example-block {
      background: var(--blue-soft);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 20px;
      margin-bottom: 28px;
    }
    .example-block p {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: var(--ink-soft);
      font-size: 16px;
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--blue-line);
      margin: 24px 0;
    }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .chip {
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .chip-syn {
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid #BFDBFE;
    }
    .chip-ant {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid #FECACA;
    }
    .no-data {
      color: var(--muted);
      font-style: italic;
      font-size: 14px;
    }

    /* ── SUBSCRIBE ── */
    .subscribe-wrap {
      margin: 40px 0;
      background: var(--navy);
      border-radius: var(--radius);
      padding: 40px 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      flex-wrap: wrap;
    }
    .subscribe-wrap h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--white);
      margin-bottom: 4px;
    }
    .subscribe-wrap p {
      font-size: 14px;
      color: #94A3B8;
    }
    .sub-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sub-form input[type="email"] {
      padding: 11px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: var(--white);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      width: 230px;
      outline: none;
      transition: border-color 0.2s;
    }
    .sub-form input::placeholder { color: #64748B; }
    .sub-form input:focus { border-color: #7EB3FF; }
    .sub-form button {
      padding: 11px 24px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .sub-form button:hover { background: #1D4ED8; transform: translateY(-1px); }
    #subscribe-msg {
      font-size: 13px;
      margin-top: 10px;
      width: 100%;
      min-height: 18px;
    }

    /* ── WEEK SECTION ── */
    .week-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }
    .week-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      white-space: nowrap;
    }
    .week-rule {
      flex: 1;
      border: none;
      border-top: 1px solid var(--blue-line);
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .week-card {
      background: var(--white);
      border: 1px solid var(--blue-line);
      border-radius: var(--radius);
      padding: 22px 24px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .week-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .week-card:hover {
      box-shadow: 0 8px 28px rgba(14,30,61,0.10);
      transform: translateY(-3px);
      border-color: #BFDBFE;
    }
    .week-card:hover::after { transform: scaleX(1); }

    .wc-word {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .wc-pos {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .wc-meaning {
      font-size: 13px;
      color: var(--ink-soft);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.6;
    }
    .wc-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 14px;
      font-weight: 500;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,18,40,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 14px;
      padding: 44px 48px;
      max-width: 560px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 24px 64px rgba(14,30,61,0.22);
    }
    .modal-close {
      position: absolute;
      top: 18px; right: 22px;
      background: var(--off-white);
      border: 1px solid var(--blue-line);
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--blue-soft); color: var(--navy); }
    #m-word {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      color: var(--navy);
      margin-bottom: 4px;
    }
    #m-phonetic {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 12px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: #64748B;
      text-align: center;
      padding: 28px 20px;
      font-size: 13px;
    }
    footer a { color: #7EB3FF; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── SKELETON ── */
    .skel {
      display: inline-block;
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel-dark {
      background: linear-gradient(90deg, #E5EBF7 25%, #F0F4FC 50%, #E5EBF7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      display: inline-block;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 640px) {
      .detail-card { padding: 28px 22px; margin-top: -20px; }
      .subscribe-wrap { padding: 28px 22px; }
      .modal-box { padding: 32px 24px; }
      .hero-strip { padding: 48px 20px 60px; }
      .sub-form input[type="email"] { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <div class="logo">Daily<em>Drop</em></div>
      <div class="nav-date" id="nav-date"></div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero-strip">
    <p class="hero-eyebrow">Word of the Day</p>
    <h1 class="hero-word" id="word"><span class="skel" style="width:280px;height:72px;">&nbsp;</span></h1>
    <p class="hero-phonetic" id="phonetic"></p>
    <span class="hero-pos" id="pos" style="visibility:hidden;"></span>
    <br>
    <button class="audio-btn" id="audio-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      Listen
    </button>
  </div>

  <!-- MAIN -->
  <div class="content">

    <!-- DETAIL CARD -->
    <div class="detail-card">
      <p class="section-label">Definition</p>
      <p class="meaning-text" id="meaning">
        <span class="skel-dark" style="width:95%;height:1.1em;">&nbsp;</span><br>
        <span class="skel-dark" style="width:75%;height:1.1em;margin-top:6px;">&nbsp;</span>
      </p>

      <div id="example-wrap" style="display:none;">
        <p class="section-label">Example</p>
        <div class="example-block"><p id="example"></p></div>
      </div>

      <hr class="card-divider">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;" id="syn-ant-grid">
        <div>
          <p class="section-label">Synonyms</p>
          <div class="chips-row" id="synonyms-chips"></div>
        </div>
        <div>
          <p class="section-label">Antonyms</p>
          <div class="chips-row" id="antonyms-chips"></div>
        </div>
      </div>
    </div>

    <!-- SUBSCRIBE -->
    <div class="subscribe-wrap">
      <div>
        <h2>Never miss a word</h2>
        <p>Delivered to your inbox every morning.</p>
      </div>
      <div>
        <form class="sub-form" id="subscribe-form">
          <input type="email" name="email" placeholder="your@email.com" required autocomplete="email" />
          <button type="submit">Subscribe</button>
        </form>
        <p id="subscribe-msg"></p>
      </div>
    </div>

    <!-- THIS WEEK -->
    <div class="week-header">
      <h2>This Week</h2>
      <hr class="week-rule">
    </div>
    <div class="week-grid" id="week-grid"></div>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="m-word">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <h2 id="m-word"></h2>
      <p id="m-phonetic"></p>
      <span class="hero-pos" id="m-pos" style="display:none;background:var(--blue-soft);color:var(--accent);border:1px solid #BFDBFE;"></span>
      <hr class="card-divider" style="margin-top:16px;">
      <p class="section-label">Definition</p>
      <p class="meaning-text" id="m-meaning" style="margin-bottom:20px;"></p>
      <div id="m-example-wrap" style="display:none;">
        <p class="section-label">Example</p>
        <div class="example-block" style="margin-bottom:20px;"><p id="m-example"></p></div>
      </div>
      <hr class="card-divider">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div>
          <p class="section-label">Synonyms</p>
          <div class="chips-row" id="m-synonyms-chips"></div>
        </div>
        <div>
          <p class="section-label">Antonyms</p>
          <div class="chips-row" id="m-antonyms-chips"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio-el" style="display:none;"></audio>

  <!-- FOOTER -->
  <footer>
    <p>© <span id="yr"></span> DailyDrop &nbsp;·&nbsp; <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">Back to top ↑</a></p>
  </footer>

  <script>
    const $ = id => document.getElementById(id);

    // Date
    const now = new Date();
    $('nav-date').textContent = now.toLocaleDateString('en-IN', { weekday:'long', month:'long', day:'numeric' }).toUpperCase();
    $('yr').textContent = now.getFullYear();

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { month:'short', day:'numeric', year:'numeric' });
    }

    function renderChips(container, text, type) {
      container.innerHTML = '';
      if (!text || !text.trim()) {
        container.innerHTML = '<span class="no-data">—</span>';
        return;
      }
      text.split(',').map(s => s.trim()).filter(Boolean).forEach(w => {
        const chip = document.createElement('span');
        chip.className = 'chip ' + (type === 'ant' ? 'chip-ant' : 'chip-syn');
        chip.textContent = w;
        container.appendChild(chip);
      });
    }

    // Load today
    async function loadToday() {
      try {
        const res  = await fetch('/today');
        const data = await res.json();

        if (!data.word) {
          $('word').textContent = 'Check back soon';
          return;
        }

        $('word').textContent    = data.word;
        $('phonetic').textContent = data.phonetic || '';

        if (data.part_of_speech) {
          const pos = $('pos');
          pos.textContent   = data.part_of_speech;
          pos.style.visibility = 'visible';
        }

        if (data.audio_url) {
          const btn = $('audio-btn');
          $('audio-el').src = data.audio_url;
          btn.style.display = 'inline-flex';
          btn.onclick = () => $('audio-el').play();
        }

        $('meaning').textContent = data.meaning || '—';

        if (data.example) {
          $('example').textContent   = data.example;
          $('example-wrap').style.display = 'block';
        }

        renderChips($('synonyms-chips'), data.synonyms, 'syn');
        renderChips($('antonyms-chips'), data.antonyms, 'ant');

      } catch(e) {
        $('word').textContent = 'Unable to load';
        console.error(e);
      }
    }

    // Load week
    async function loadWeek() {
      try {
        const res   = await fetch('/week');
        const words = await res.json();
        const grid  = $('week-grid');
        grid.innerHTML = '';

        if (!words.length) {
          grid.innerHTML = '<p class="no-data" style="padding:20px 0;">No previous words yet — check back tomorrow!</p>';
          return;
        }

        words.forEach((item, i) => {
          const card = document.createElement('div');
          card.className = 'week-card';
          card.style.animationDelay = (i * 0.06) + 's';
          card.innerHTML = `
            <div class="wc-word">${item.word}</div>
            <div class="wc-pos">${item.part_of_speech || ''}</div>
            <div class="wc-meaning">${item.meaning || ''}</div>
            <div class="wc-date">${formatDate(item.created_at)}</div>
          `;
          card.addEventListener('click', () => openModal(item));
          grid.appendChild(card);
        });
      } catch(e) { console.error(e); }
    }

    // Modal
    function openModal(item) {
      $('m-word').textContent     = item.word || '';
      $('m-phonetic').textContent = item.phonetic || '';
      $('m-meaning').textContent  = item.meaning || '—';

      const mPos = $('m-pos');
      if (item.part_of_speech) {
        mPos.textContent   = item.part_of_speech;
        mPos.style.display = 'inline-block';
      } else {
        mPos.style.display = 'none';
      }

      if (item.example) {
        $('m-example').textContent        = item.example;
        $('m-example-wrap').style.display = 'block';
      } else {
        $('m-example-wrap').style.display = 'none';
      }

      renderChips($('m-synonyms-chips'), item.synonyms, 'syn');
      renderChips($('m-antonyms-chips'), item.antonyms, 'ant');

      $('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      $('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    $('modal-close').addEventListener('click', closeModal);
    $('modal-overlay').addEventListener('click', e => { if (e.target === $('modal-overlay')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Subscribe
    $('subscribe-form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg = $('subscribe-msg');
      msg.style.color = '#94A3B8';
      msg.textContent = 'Subscribing…';
      try {
        const fd  = new FormData($('subscribe-form'));
        const res = await fetch('/subscribe', { method:'POST', body:fd });
        const data = await res.json();
        if (data.status === 'success') {
          msg.style.color = '#34D399';
          msg.textContent = data.message;
          $('subscribe-form').reset();
        } else {
          msg.style.color = '#F87171';
          msg.textContent = data.message || 'Something went wrong.';
        }
      } catch {
        msg.style.color = '#F87171';
        msg.textContent = 'Network error. Please try again.';
      }
    });

    loadToday();
    loadWeek();
  </script>
</body>
</html>
